<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick AI Agent Todo Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="agent-app">
      <header class="app-header">
        <div>
          <h1>Quick AI Agent Todo Demo</h1>
          <p>Chat with an agent that can inspect and update the todo list through Quick tools.</p>
        </div>
        <p id="user-status">Checking sign-in...</p>
      </header>

      <section class="tools-strip" aria-labelledby="tools-heading">
        <h2 id="tools-heading">Enabled tools</h2>
        <p id="enabled-tools">Loading tools...</p>
      </section>

      <div class="workspace">
        <section class="chat-panel" aria-labelledby="chat-heading">
          <div class="panel-header">
            <div>
              <h2 id="chat-heading">Agentic chat</h2>
              <p id="status">Sign in, then ask the agent to manage the todo list.</p>
            </div>
            <button id="clear-output" class="secondary" type="button">Clear chat</button>
          </div>

          <ol id="transcript" aria-live="polite"></ol>

          <form id="agent-form" class="composer" hidden>
            <details>
              <summary>Instructions</summary>
              <textarea id="instructions" name="instructions" rows="8"></textarea>
            </details>

            <label for="agent-input">Message the agent</label>
            <textarea id="agent-input" name="input" rows="3" required>What is on my todo list?</textarea>

            <div class="actions">
              <button type="submit">Send</button>
              <button id="reset-prompt" class="secondary" type="button">Reset prompt</button>
            </div>
          </form>
        </section>

        <aside class="todo-panel" aria-labelledby="todo-heading">
          <div class="panel-header compact">
            <div>
              <h2 id="todo-heading">Todo list</h2>
              <p id="todo-status">Loading todos...</p>
            </div>
          </div>
          <ul id="todo-list" aria-live="polite"></ul>
        </aside>
      </div>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
