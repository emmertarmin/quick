<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Agentic App Ideas</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div>
          <p class="eyebrow">quick.ai.agent demo</p>
          <h1>Agentic app idea generator</h1>
          <p class="lede">Describe a domain or annoyance. The agent turns it into small Quick app concepts with data models and UI sketches.</p>
        </div>
        <p id="user-status">Checking sign-in...</p>
      </header>

      <section class="panel input-panel" aria-labelledby="input-heading">
        <h2 id="input-heading">Seed prompt</h2>
        <form id="idea-form">
          <label class="visually-hidden" for="seed">What should the apps be about?</label>
          <textarea id="seed" rows="7" required>I'm organizing a neighborhood summer festival with volunteers, food stalls, equipment borrowing, shift schedules, and a few last-minute changes every day.</textarea>
          <button type="submit">Generate app ideas</button>
        </form>
      </section>

      <section class="panel output-panel" aria-labelledby="output-heading">
        <div class="output-header">
          <h2 id="output-heading">Agent output</h2>
          <p id="status">Sign in, then click generate.</p>
        </div>
        <pre id="output" aria-live="polite">Your app ideas will appear here.</pre>
      </section>
    </main>

    <script type="module">
      import { createQuickClient } from "/quick.js";

      const quick = createQuickClient();
      const userStatus = document.querySelector("#user-status");
      const form = document.querySelector("#idea-form");
      const seed = document.querySelector("#seed");
      const status = document.querySelector("#status");
      const output = document.querySelector("#output");
      const submitButton = form.querySelector("button[type='submit']");

      const instructions = `You are an agentic product ideation assistant for Quick, a platform for small static apps with authenticated AI, identity, schemaless collections, realtime channels, file uploads, and deployed static sites.

Given a user's domain, propose exactly 3 small Quick app ideas. For each idea include:
- app name
- user problem
- core workflow
- suggested Quick primitives: identity, db collections, realtime, files, ai
- minimal data model with collection names and fields
- one delightful UI detail

Be concrete, concise, and practical. Prefer apps that could be built as a single static page.`;

      function setGenerating(value) {
        submitButton.disabled = value;
        seed.disabled = value;
        output.classList.toggle("loading", value);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const input = seed.value.trim();
        if (!input) return;

        setGenerating(true);
        status.textContent = "Agent is decomposing the domain into app concepts...";
        output.textContent = "Thinking...";

        try {
          const result = await quick.ai.agent({ instructions, input });
          output.textContent = result.output || "No output returned.";
          status.textContent = "Generated with quick.ai.agent and no tools.";
        } catch (error) {
          console.error(error);
          status.textContent = error instanceof Error ? error.message : String(error);
          output.textContent = "Generation failed. Check the console for details.";
        } finally {
          setGenerating(false);
        }
      });

      async function main() {
        const session = await quick.auth.session();

        if (!session.authenticated) {
          userStatus.textContent = "You are not signed in.";
          form.hidden = true;
          status.textContent = "This demo requires an authenticated Quick session.";
          const login = await quick.auth.login({ returnTo: location.href });
          const link = document.createElement("a");
          link.href = login.authorizationUrl;
          link.textContent = "Sign in to try it";
          status.append(" ", link);
          return;
        }

        userStatus.textContent = `Signed in as ${session.user.email ?? session.user.id}`;
        form.hidden = false;
      }

      await main();
    </script>
  </body>
</html>
